name: attachments
type: llm_span_test
provider: bedrock
endpoint: /model/{modelId}/converse
requests:
  - modelId: us.amazon.nova-lite-v1:0
    messages:
      - role: user
        content:
          - text: Briefly describe these attachments
          - image:
              format: png
              source:
                # 1x1 red pixel
                bytes: iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8DwHwAFBQIAX8jx0gAAAABJRU5ErkJggg==
          - document:
              format: pdf
              name: blank
              source:
                # single blank page PDF
                bytes: 
expected_brainstore_spans:
  - metrics:
      tokens: !fn is_non_negative_number
      prompt_tokens: !fn is_non_negative_number
      completion_tokens: !fn is_non_negative_number
    metadata:
      model: us.amazon.nova-lite-v1:0
      provider: bedrock
    span_attributes:
      name: bedrock.converse
      type: llm
    context:
      sdk:
        name: !fn is_non_empty_string
        version: !fn is_non_empty_string
      instrumentation:
        name: !fn is_non_empty_string
    input:
      - role: user
        content:
          - type: text
            text: Briefly describe these attachments
          - type: image
            image:
              format: png
              source:
                bytes:
                  type: braintrust_attachment
                  content_type: image/png
                  filename: !fn is_non_empty_string
                  key: !fn is_non_empty_string
          - document:
              format: pdf
              name: blank
              source:
                bytes:
                  type: braintrust_attachment
                  content_type: application/pdf
                  filename: !fn is_non_empty_string
                  key: !fn is_non_empty_string
    output:
      - role: assistant
        content:
          - type: text
