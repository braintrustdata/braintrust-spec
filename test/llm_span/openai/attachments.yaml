name: attachments
type: llm_span_test
provider: openai
endpoint: /v1/chat/completions
requests:
  - model: gpt-4o
    temperature: 0.0
    messages:
      - role: system
        content: you are a helpful assistant
      - role: user
        content:
        - type: text
          text: Briefly describe these attachments
        - type: image_url
          image_url:
            # 1x1 red pixel
            url: data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8DwHwAFBQIAX8jx0gAAAABJRU5ErkJggg==
        - type: file
          file:
            filename: blank.pdf
            # single blank page PDF
            file_data: data:application/pdf;base64,
expected_brainstore_spans:
  - metrics:
      tokens: !fn is_non_negative_number
      prompt_tokens: !fn is_non_negative_number
      completion_tokens: !fn is_non_negative_number
    metadata:
      model: !starts_with "gpt-4o"
      provider: openai
    span_attributes:
      name: Chat Completion
      type: llm
    context:
      sdk:
        name: !fn is_non_empty_string
        version: !fn is_non_empty_string
      instrumentation:
        name: !fn is_non_empty_string
    input:
      - role: system
        content: you are a helpful assistant
      - role: user
        content:
          - text: Briefly describe these attachments
            type: text
          - image_url:
              url:
                content_type: image/png
                filename: !fn is_non_empty_string
                key: !fn is_non_empty_string
                type: braintrust_attachment
            type: image_url
          - file:
              filename: !fn is_non_empty_string
              file_data:
                content_type: application/pdf
                filename: !fn is_non_empty_string
                key: !fn is_non_empty_string
                type: braintrust_attachment
            type: file
    output:
      - finish_reason: stop
        index: 0
        message:
          role: assistant
          content: !fn is_non_empty_string
