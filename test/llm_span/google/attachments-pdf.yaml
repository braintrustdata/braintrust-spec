name: attachments
type: llm_span_test
provider: google
endpoint: /v1/models/gemini-3.1-flash-lite-preview:generateContent
requests:
  - contents:
      - role: user
        parts:
          - text: What color is this pdf?
          - inline_data:
              mime_type: application/pdf
              # single white page
              data: JVBERi0xLjEKMSAwIG9iago8PC9UeXBlL0NhdGFsb2cvUGFnZXMgMiAwIFI+PgplbmRvYmoKMiAwIG9iago8PC9UeXBlL1BhZ2VzL0NvdW50IDEvS2lkc1szIDAgUl0+PgplbmRvYmoKMyAwIG9iago8PC9UeXBlL1BhZ2UvUGFyZW50IDIgMCBSL01lZGlhQm94WzAgMCAxIDFdPj4KZW5kb2JqCnRyYWlsZXIKPDwvUm9vdCAxIDAgUj4+CiUlRU9G
    generationConfig:
      temperature: 0.0
expected_brainstore_spans:
  - metrics:
      tokens: !fn is_non_negative_number
      prompt_tokens: !fn is_non_negative_number
      completion_tokens: !fn is_non_negative_number
    metadata:
      model: !starts_with gemini-3.1-flash-lite
    span_attributes:
      name: generate_content
      type: llm
    input:
      model: !starts_with gemini-3.1-flash-lite
      contents:
        - role: user
          parts:
            - text: What color is this pdf?
            - file:
                file_data:
                  content_type: application/pdf
                  filename: !fn is_non_empty_string
                  key: !fn is_non_empty_string
                  type: braintrust_attachment
    output:
      candidates:
        - content:
            parts:
              - text: !fn is_non_empty_string
            role: model
