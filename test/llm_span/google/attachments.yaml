name: attachments
type: llm_span_test
provider: google
endpoint: /v1/models/gemini-3.1-flash-lite-preview:generateContent
requests:
  - contents:
      - role: user
        parts:
          - text: Briefly describe these attachments
          - inline_data:
              mime_type: image/png
              # 1x1 red pixel
              data: iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8DwHwAFBQIAX8jx0gAAAABJRU5ErkJggg==
          - inline_data:
              mime_type: application/pdf
              # single blank page PDF
              data: 
          - inline_data:
              mime_type: audio/wav
              # 0.1s silent WAV (8000Hz, mono, 8-bit)
              data: 
          - inline_data:
              mime_type: video/mp4
              # 1s black 2x2 pixel video (H.264)
              data: 
    generationConfig:
      temperature: 0.0
expected_brainstore_spans:
  - metrics:
      tokens: !fn is_non_negative_number
      prompt_tokens: !fn is_non_negative_number
      completion_tokens: !fn is_non_negative_number
    metadata:
      model: !starts_with gemini-3.1-flash-lite
    span_attributes:
      name: generate_content
      type: llm
    input:
      model: !starts_with gemini-3.1-flash-lite
      contents:
        - role: user
          parts:
            - text: Briefly describe these attachments
            - image_url:
                url:
                  content_type: image/png
                  filename: !fn is_non_empty_string
                  key: !fn is_non_empty_string
                  type: braintrust_attachment
            - file:
                file_data:
                  content_type: application/pdf
                  filename: !fn is_non_empty_string
                  key: !fn is_non_empty_string
                  type: braintrust_attachment
            - file:
                file_data:
                  content_type: audio/wav
                  filename: !fn is_non_empty_string
                  key: !fn is_non_empty_string
                  type: braintrust_attachment
            - file:
                file_data:
                  content_type: video/mp4
                  filename: !fn is_non_empty_string
                  key: !fn is_non_empty_string
                  type: braintrust_attachment
    output:
      candidates:
        - content:
            parts:
              - text: !fn is_non_empty_string
            role: model
